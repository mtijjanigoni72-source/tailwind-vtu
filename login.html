<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MTechDataSub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-6">
        <!-- Logo/Header Area -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-700 uppercase tracking-tight">
                MTech<span class="text-orange-500">Data</span>Sub
            </h1>
            <p class="text-slate-500 mt-2">Welcome back! Please login to your account.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <form action="#" method="POST" class="space-y-6">
                
                <!-- Email/Username Field -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email, Phone Number or Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="text" placeholder="email, phone number or username" required
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-semibold text-slate-700">Password</label>
                        <a href="forgetpassword.html" class="text-xs font-medium text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" placeholder="••••••••" 
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="remember" class="ml-2 text-sm text-slate-600 cursor-pointer">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg shadow-blue-200">
                    Login to Dashboard
                </button>
            </form>

            <!-- Footer Links -->
            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <p class="text-sm text-slate-500">
                    Don't have an account? 
                    <a href="register.html" class="font-bold text-orange-500 hover:text-orange-600 transition">Register Now</a>
                </p>
            </div>
        </div>

        <!-- Support Info -->
        <div class="mt-8 text-center text-xs text-slate-400">
            &copy; 2026 MTechDataSub. All rights reserved. <br>
            <span class="hover:text-blue-500 cursor-pointer">Privacy Policy</span> | <span class="hover:text-blue-500 cursor-pointer">Terms of Service</span>
        </div>
    </div>

</body>
</html>
