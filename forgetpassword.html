<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MTechDataSub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-700 uppercase tracking-tight">
                MTech<span class="text-orange-500">Data</span>Sub
            </h1>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                    <i class="fa-solid fa-key text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Forgot Password?</h2>
                <p class="text-slate-500 mt-2 text-sm">No worries! Enter the email associated with your account and we'll send a reset link.</p>
            </div>

            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" placeholder="john@example.com" required
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg shadow-blue-200">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <a href="login.html" class="inline-flex items-center text-sm font-semibold text-slate-500 hover:text-blue-700 transition">
                    <i class="fa-solid fa-arrow-left mr-2"></i>
                    Back to Login
                </a>
            </div>
        </div>

        <p class="mt-8 text-center text-sm text-slate-500">
            Need more help? <a href="#" class="text-blue-600 font-medium">Contact Support</a>
        </p>
    </div>

    </body>
</html>
